name: Build github.com/obsproject/obs-studio
on:
  # Nightly rebuild to pick up Ubuntu + OBS PPA package updates.
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag to push (e.g. 30.2 or a date). Defaults to "latest".'
        required: false
        default: latest

env:
  REGISTRY: ghcr.io

# Least privilege: only need to push the package. No commit-back, so no contents: write.
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Downcase REPO for image push
        run: echo "REPO=${GITHUB_REPOSITORY@L}" >> "${GITHUB_ENV}"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: github.com/obsproject/obs-studio/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/obs-studio:${{ inputs.version || 'latest' }}
          platforms: linux/amd64
          target: final

      - name: Clean up old tagged container versions
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
        with:
          package-name: 'container-rebuilds/obs-studio'
          package-type: 'container'
          min-versions-to-keep: 3
          delete-only-untagged-versions: false
