name: Check & build github.com/paperless-ngx/paperless-ngx
on:
  schedule:
    - cron: '0 */12 * * *'
    # Weekly forced rebuild to pick up base-image security patches.
    - cron: '0 4 * * 1'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - github.com/paperless-ngx/paperless-ngx/**

env:
  REGISTRY: ghcr.io

# A push during the debounce sleep (or mid-build) cancels this run in favour of the new one.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Debounce rapid pushes
        if: github.event_name == 'push'
        run: sleep 20
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fetch release version
        run: |
          curl -sL https://api.github.com/repos/paperless-ngx/paperless-ngx/releases/latest | \
          jq -r ".tag_name" > github.com/paperless-ngx/paperless-ngx/latest.txt
      - name: Check for modified files
        id: git-check
        run: echo "modified=$([ -z "`git status --porcelain`" ] && echo "false" || echo "true")" >> "$GITHUB_OUTPUT"
      # Build on a new release, on the weekly forced-rebuild cron, or when triggered by hand.
      - name: Decide whether to build
        id: build-check
        run: echo "build=$([ '${{ steps.git-check.outputs.modified }}' = 'true' -o '${{ github.event_name }}' = 'workflow_dispatch' -o '${{ github.event_name }}' = 'push' -o '${{ github.event.schedule }}' = '0 4 * * 1' ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
      - name: Read latest.txt file
        id: getversion
        run: echo "version=$(cat github.com/paperless-ngx/paperless-ngx/latest.txt | sed -e "s/^v//")" >> "$GITHUB_OUTPUT"
      - name: Commit latest release version
        if: steps.git-check.outputs.modified == 'true'
        run: |
          git config --global user.name 'GitHub Workflow'
          git config --global user.email 'sigurs@users.noreply.github.com'
          git commit -am "github.com/paperless-ngx/paperless-ngx new release version"
          git push

      # Build if needed
      - name: Log in to the Container registry
        if: steps.build-check.outputs.build == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.build-check.outputs.build == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Downcase REPO for image push
        if: steps.build-check.outputs.build == 'true'
        run: |
          echo "REPO=${GITHUB_REPOSITORY@L}" >> "${GITHUB_ENV}"

      - name: Build and push
        id: build
        if: steps.build-check.outputs.build == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: github.com/paperless-ngx/paperless-ngx
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/paperless-ngx:${{ steps.getversion.outputs.version }}
          platforms: linux/amd64
          target: final
          build-args: |
            IMAGE_TAG=${{ steps.getversion.outputs.version }}

      - name: Notify Discord
        if: github.event_name == 'push'
        uses: ./.github/actions/notify-discord
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          image: ${{ env.REGISTRY }}/${{ env.REPO }}/paperless-ngx
          tag: ${{ steps.getversion.outputs.version }}
          digest: ${{ steps.build.outputs.digest }}

      - name: Clean up old tagged container versions
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
        with:
          package-name: 'container-rebuilds/paperless-ngx'
          package-type: 'container'
          min-versions-to-keep: 3
          delete-only-untagged-versions: false
