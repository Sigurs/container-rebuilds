name: Check & build github.com/NOALBS/nginx-obs-automatic-low-bitrate-switching
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fetch release version
        run: |
          curl -sL https://api.github.com/repos/NOALBS/nginx-obs-automatic-low-bitrate-switching/releases/latest | \
          jq -r ".tag_name" > github.com/NOALBS/nginx-obs-automatic-low-bitrate-switching/latest.txt
      - name: Check for modified files
        id: git-check
        run: echo "modified=$([ -z "`git status --porcelain`" ] && echo "false" || echo "true")" >> "$GITHUB_OUTPUT"
      - name: Read latest.txt file
        id: getversion
        run: echo "version=$(cat github.com/NOALBS/nginx-obs-automatic-low-bitrate-switching/latest.txt)" >> "$GITHUB_OUTPUT"
      - name: Commit latest release version
        if: steps.git-check.outputs.modified == 'true'
        run: |
          git config --global user.name 'GitHub Workflow'
          git config --global user.email 'sigurs@users.noreply.github.com'
          git commit -am "github.com/NOALBS/nginx-obs-automatic-low-bitrate-switching new release version"
          git push

      # Build if needed
      - name: Log in to the Container registry
        if: steps.git-check.outputs.modified == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.git-check.outputs.modified == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Downcase REPO for image push
        if: steps.git-check.outputs.modified == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          echo "REPO=${GITHUB_REPOSITORY@L}" >> "${GITHUB_ENV}"

      - name: Build and push
        if: steps.git-check.outputs.modified == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: github.com/NOALBS/nginx-obs-automatic-low-bitrate-switching
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/noalbs:${{ steps.getversion.outputs.version }}
          platforms: linux/amd64
          target: final
          build-args: |
            VERSION=${{ steps.getversion.outputs.version }}

      - name: Clean up old tagged container versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'container-rebuilds/noalbs'
          package-type: 'container'
          min-versions-to-keep: 3
          delete-only-untagged-versions: false
